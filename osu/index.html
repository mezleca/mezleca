<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>osu!</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="gallery">
        <h1>osu! stuff</h1>
        <div class="gallery-content">
            <div class="gallery-item"
                data-bg="https://github.com/mezleca/mezleca/raw/main/osu/skins/Aristia2024/cover.png"
                data-name="Aristia2024"
                data-route="osu">
                <p class="title">2024 nomod skin</p>
                <svg class="download-btn" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path fill="currentColor" fill-opacity="0" stroke-dasharray="20" stroke-dashoffset="20" d="M12 4h2v6h2.5l-4.5 4.5M12 4h-2v6h-2.5l4.5 4.5"><animate fill="freeze" attributeName="fill-opacity" begin="0.7s" dur="0.5s" values="0;1"/><animate fill="freeze" attributeName="stroke-dashoffset" dur="0.4s" values="20;0"/></path><path stroke-dasharray="14" stroke-dashoffset="14" d="M6 19h12"><animate fill="freeze" attributeName="stroke-dashoffset" begin="0.5s" dur="0.2s" values="14;0"/></path></g></svg>
            </div>
            <div class="gallery-item"  
                data-bg="https://github.com/mezleca/mezleca/raw/main/osu/skins/Aristia2025/cover.png"
                data-name="Aristia2025"
                data-route="osu">
                <p class="title">2025 nomod skin</p>
                <svg class="download-btn" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path fill="currentColor" fill-opacity="0" stroke-dasharray="20" stroke-dashoffset="20" d="M12 4h2v6h2.5l-4.5 4.5M12 4h-2v6h-2.5l4.5 4.5"><animate fill="freeze" attributeName="fill-opacity" begin="0.7s" dur="0.5s" values="0;1"/><animate fill="freeze" attributeName="stroke-dashoffset" dur="0.4s" values="20;0"/></path><path stroke-dasharray="14" stroke-dashoffset="14" d="M6 19h12"><animate fill="freeze" attributeName="stroke-dashoffset" begin="0.5s" dur="0.2s" values="14;0"/></path></g></svg>
            </div>
            <div class="gallery-item"  
                data-bg="https://github.com/mezleca/mezleca/raw/main/osu/skins/Aristia2026/cover.png"
                data-name="Aristia2026"
                data-route="osu">
                <p class="title">2026 nomod skin</p>
                <svg class="download-btn" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path fill="currentColor" fill-opacity="0" stroke-dasharray="20" stroke-dashoffset="20" d="M12 4h2v6h2.5l-4.5 4.5M12 4h-2v6h-2.5l4.5 4.5"><animate fill="freeze" attributeName="fill-opacity" begin="0.7s" dur="0.5s" values="0;1"/><animate fill="freeze" attributeName="stroke-dashoffset" dur="0.4s" values="20;0"/></path><path stroke-dasharray="14" stroke-dashoffset="14" d="M6 19h12"><animate fill="freeze" attributeName="stroke-dashoffset" begin="0.5s" dur="0.2s" values="14;0"/></path></g></svg>
            </div>
            <div class="gallery-item"
                data-bg="https://github.com/mezleca/mezleca/raw/main/osu/area.png"
                data-route="osu">
                <p class="title">area (1400x900 in game)</p>
            </div>
        </div>
    </div>
    
    <div class="lightbox" id="lightbox" style="display: none;">
        <span class="lightbox-close">&times;</span>
        <img id="lightbox-img" src="">
    </div>

    <script src="../script.js"></script>
</body>
</html>
